<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PUNCH BUNCH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:url('images/background 2.png') no-repeat center/cover;
}

/* GAME */
#game{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* PLAYER */
#player{
  position:absolute;
  bottom:0%;
  left:10%;
}
#player img{
  width:clamp(80px, 15vw, 120px);
}

/* OBJECT */
#object{
  position:absolute;
  bottom:0;
  left:100%;
}
#object img{
  width:clamp(60px, 10vw, 80px);
}

/* JUMP */
.animate{
  animation:jump 0.5s;
}
@keyframes jump{
  0%{ bottom:0; }
  50%{ bottom:180px; }
  100%{ bottom:0; }
}

/* SCORE */
.score-container{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  z-index:1000;
}
.score-box{
  background: white ;
  color:black;
  padding:10px 20px;
  border-radius:15px;
  text-align:center;
}
.score-box span{
  font-size:20px;
  font-weight:bold;
}

.highlight-score{
  background: #ffffff;          
  color: #000000;               
  box-shadow: 0 0 20px #fff;    
  transform: scale(1.2);       
  transition: 0.3s;
}

/* RESULT SCREEN */
.result-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
  z-index:500;
}

/* BUTTON */
.result-buttons{
  position:absolute;
  bottom:15%;
  width:100%;
  display:flex;
  justify-content:center;
  gap:60px;
}

.btn{
  padding:clamp(12px, 2.5vw, 18px) clamp(25px, 5vw, 35px);
  border-radius: 30px;
  font-size:clamp(14px, 2.5vw, 18px);
  font-weight:bold;
  border:none;
  cursor:pointer;
  transition:0.3s;

  border: 2px solid black;
}


.restart{
  background:#0162c8;
  color:black;
}

.home{
  background:red;
  color:black;
}

/* HOVER */
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  border-color: black;
}

.btn:active{
  transform:scale(0.9);
}

.result-box{
  position:relative;
  width:80%;
  max-width:400px;
}

.result-box img{
  width:100%;
}
/*BUTTONS*/
/* MOBILE BUTTONS */
.mobile-controls{
  position:fixed;
  bottom:320px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:1020px;
}
.control-btn{
  width:60px;
}
</style>
</head>

<body>

<div id="game">

  <!-- SCORE -->
  <div class="score-container">
    <div class="score-box">
      Score<br><span id="score">0</span>
    </div>
    <div class="score-box">
      High Score<br><span id="highScore">0</span>
    </div>
  </div>

  <!-- PLAYER -->
  <div id="player">
    <img id="playerImg" src="images/pstance.png">
  </div>

  <!-- OBJECT -->
  <div id="object">
    <img id="objectImg" src="images/spike.png">
  </div>

</div>

<!-- RESULT SCREEN -->
<div id="resultScreen" class="result-screen">
  <div class="result-box">
    <img src="images/instruction.png">
    <div class="result-buttons"></div>
  <button class="btn restart" onclick="restartGame()"><strong>RESTART</strong></button> 
  <button class="btn home" onclick="goHome()"><strong>HOME</strong></button>
</div>
    
  
<!-- MOBILE CONTROLS -->
<div class="mobile-controls">
  <img src="images/jumpbtn.png" class="control-btn" onclick="jump()">
  <img src="images/punchbtn.png" class="control-btn" onclick="punch()">
</div>

<!-- SOUNDS -->
<audio id="jumpSound" src="sounds/jump.mp3"></audio>
<audio id="punchSound" src="sounds/punch.mp3"></audio>
<audio id="bellSound" src="sounds/bell.mp3"></audio>
<audio id="cheerSound" src="sounds/cheer.mp3"></audio>
<audio id="bgMusic" src="sounds/bg.mp3" loop></audio>

<script>

/* ---------------- SOUND SYSTEM ---------------- */

let soundOn = true;

function playSound(sound){
  if(!soundOn || !sound) return;

  sound.currentTime = 0;
  sound.play();
}

/* background music */
function startMusic(){
  const music = document.getElementById("bgMusic");
  if(soundOn){
    music.volume = 0.2; // 🔥 LOWER VOLUME
    music.play();
  }
}

let musicStarted = false;

function tryStartMusic(){
  if(musicStarted) return;

  const music = document.getElementById("bgMusic");

  music.volume = 0.1;

  music.play().then(()=>{
    musicStarted = true;
  }).catch(()=>{});
}

/* trigger on ANY interaction */
document.addEventListener("click", tryStartMusic);
document.addEventListener("keydown", tryStartMusic);
document.addEventListener("touchstart", tryStartMusic);

/* ---------------- GAME VARIABLES ---------------- */

let isPunching = false;
let isJumping = false;

let player = document.getElementById("player");
let playerImg = document.getElementById("playerImg");

let score = 0;
let speed = 5.5; 
let gameRunning = true;

let spawnInterval = 1200; 
let spawnTimer;

/* HIGH SCORE */
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

/* ---------------- CONTROLS ---------------- */

document.addEventListener("keydown", function(e){
  if(e.key === "f") jump();
  if(e.key === "a") punch();
});

/* ---------------- JUMP ---------------- */

function jump(){
  if(isJumping) return;

  isJumping = true;

  player.classList.add("animate");
  playerImg.src = "images/pblock.png";

  playSound(document.getElementById("jumpSound"));

  setTimeout(()=>{
    player.classList.remove("animate");
    playerImg.src = "images/pstance.png";
    isJumping = false;
  },500);
}

/* ---------------- PUNCH ---------------- */

function punch(){
  if(isPunching) return;

  isPunching = true;

  playerImg.src = "images/ppunch.png";
  playSound(document.getElementById("punchSound"));

  setTimeout(()=>{
    playerImg.src = "images/pstance.png";
    isPunching = false;
  },300);
}

/* ---------------- OBJECT SPAWN ---------------- */

function createObject(){

  if(!gameRunning) return;

  const obj = document.createElement("img");

  let type = Math.random() > 0.5 ? "spike" : "glove";

  obj.src = (type === "spike") 
    ? "images/spike.png" 
    : "images/glove.png";

  obj.style.position = "absolute";
  obj.style.bottom = "30%";
  obj.style.left = window.innerWidth + "px";
  obj.style.width = "clamp(85px, 12vw, 110px)";

  document.getElementById("game").appendChild(obj);

  let pos = window.innerWidth;

  let move = setInterval(()=>{

    if(!gameRunning){
      clearInterval(move);
      return;
    }

    pos -= speed;
    obj.style.left = pos + "px";

    let p = player.getBoundingClientRect();
    let o = obj.getBoundingClientRect();

    let hit = (
      o.left < p.right - 30 &&
      o.right > p.left + 30 &&
      o.bottom > p.top + 30 &&
      o.top < p.bottom
    );

    if(hit){

      if(type === "spike"){
        if(isJumping){
          updateScore();
        } else {
          gameOver();
        }
      }

      if(type === "glove"){
        if(isPunching){
          updateScore();
        } else {
          gameOver();
        }
      }

      obj.remove();
      clearInterval(move);
      return;
    }

    if(pos < -150){
      obj.remove();
      clearInterval(move);
    }

  },20);

  if(gameRunning){
    spawnTimer = setTimeout(createObject, spawnInterval);
  }
}

/* ---------------- SCORE ---------------- */

function updateScore(){
  score++;
  document.getElementById("score").innerText = score;

  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
    document.getElementById("highScore").innerText = highScore;
  }

  if(score % 5 === 0){

    if(score === 5){
      speed = 6.0; spawnInterval = 1100;
    } 
    else if(score === 10){
      speed = 6.5; spawnInterval = 1000;
    }
    else if(score === 15){
      speed = 8.0; spawnInterval = 850;
    }
    else if(score === 20){
      speed = 8.5; spawnInterval = 750;
    }
    else if(score === 25){
      speed = 10.0; spawnInterval = 650;
    }
    else if(score === 30){
      speed = 10.5; spawnInterval = 550;
    }
  }
}

/* ---------------- GAME OVER ---------------- */

function gameOver(){
  if(!gameRunning) return;

  gameRunning = false;
  clearTimeout(spawnTimer);

  playSound(document.getElementById("bellSound"));

  setTimeout(()=>{
    playSound(document.getElementById("cheerSound"));
  },300);

  document.getElementById("bgMusic").pause();

  document.getElementById("resultScreen").style.display = "flex";

  document.querySelectorAll(".score-box").forEach(box=>{
    box.classList.add("highlight-score");
  });
}

/* ---------------- BUTTONS ---------------- */

function restartGame(){
  location.reload();
}

function goHome(){
  window.location.href = "MAIN PAGE.html";
}

/* ---------------- START GAME ---------------- */

createObject();

</script>
</body>
</html>
