<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>&#129354;&#128293;FIGHT NIGHT &#128293;&#129354;</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

  <!--Link your CSS file-->
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.cdnfonts.com/css/brick-sans" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0%;
      height: 100%;
      display: flex;
      flex-direction: column;
      font-family: 'Brick Sans', Arial, Helvetica, sans-serif;                                          
      background-image: url('images/background1.png');
      background-size:100% 100%;
      background-repeat: no-repeat;
      color: black;
      justify-content: center;
      align-items: center;
    }

    .introscreen{
      position:fixed;
      width:100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .introscreen img{
      width:80%;
      max-width:700px;
    }

   .menu-buttons{
     position: absolute;
     transform:translateX(-50%);
     display:flex;
     gap:20px;
     flex-wrap: wrap;
     justify-content: center;
    }

    .btn{
     position: relative;
     top:200px;
     left:50%;
     padding:15px 40px;
     border-radius:30px;
     text-decoration:none;
     color:black;
     font-size: 35px;
     font-weight:bold;
     overflow:hidden;
     cursor:pointer;
     word-spacing: 2px;
     transition:0.3s;
    }

    .fight{
     background:red;
    }

   .instructions{
      background:#0162c8;
    } 

   .btn:hover:first-child{
     transform:scale(1.1);
     box-shadow:black;
     background: red;
    }

   .btn:hover:last-child{
     transform:scale(1.1);
     box-shadow:black;
     background:#0162c8;
    }

    .ripple{
     position:absolute;
     width:20px;
     height:20px;
     background:black;
     border-radius:60%;
     transform:translate(-50%, -50%);
     animation:ripple-effect 0.6s linear;
    }

    .instructions-container{
    position: absolute;
    display: none; /* hidden first */
    justify-content: center;
    align-items: center;
  }

.instructions-img{
  width:100%;
  max-width:600px;
}

.close-btn{
  margin-top: 470px;
  padding: 10px 20px;
  border: none;
  background: red;
  color: black;
  border-radius: 20px;
  cursor: pointer;
  position: absolute;
}

    @keyframes ripple-effect{
    0%{
      width:0;
      height:0;
      opacity:0.5;
    }

  100%{
    width:500px;
    height:500px;
    opacity:0;
  }
}

ul {
  list-style:none;
  background: #808080;
}
ul li {
display:inline-block;
position: absolute;
}

  </style>
  </head>
  <body> 
  <div class="introscreen">
    <img src="images/intro box.png" alt="Introbox">
     <div class="menu-buttons">
        <a class="btn fight"><strong>FIGHT!</strong></a>
        <a class="btn instructions"><Strong>INSTRUCTIONS</Strong></a>
    </div>
  </div>
  <ul>
    <li><a href="#"></a>	&#9878;	</li>
    <li><a href="#"></a>&#128266;</li>
    <li><a href="#">S</a></li>
  </ul>
  </body>

  <script>
 const buttons = document.querySelectorAll(".btn");

buttons.forEach(button => {
  button.addEventListener("click", function(e){

    const ripple = document.createElement("span");
    ripple.classList.add("ripple");

    const rect = button.getBoundingClientRect();
    ripple.style.left = (e.clientX - rect.left) + "px";
    ripple.style.top = (e.clientY - rect.top) + "px";

    button.appendChild(ripple);

    setTimeout(()=>{
      ripple.remove();
    },600);

  });
});
</script>
<script>
const instructionsBtn = document.querySelector(".instructions");
const instructionsBox = document.getElementById("instructionsBox");
const closeBtn = document.querySelector(".close-btn");

instructionsBtn.addEventListener("click", () => {
  instructionsBox.style.display = "flex";
});

closeBtn.addEventListener("click", () => {
  instructionsBox.style.display = "none";
});
</script>
</html>
